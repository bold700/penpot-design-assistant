<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #1e1e1e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 14px 16px 10px;
      flex-shrink: 0;
      border-bottom: 1px solid #2a2a2a;
    }
    .header h1 { font-size: 13px; font-weight: 700; color: #fff; }
    .header p  { font-size: 11px; color: #555; margin-top: 2px; }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 90%;
    }
    .message.user   { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .bubble {
      background: #7c3aed;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.assistant .bubble {
      background: #252525;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .thinking .bubble {
      color: #555;
      font-style: italic;
    }

    /* Suggested questions */
    .suggestions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }
    .suggestion-btn {
      background: #252525;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #888;
      font-size: 11px;
      padding: 7px 10px;
      text-align: left;
      cursor: pointer;
      transition: all 0.1s;
    }
    .suggestion-btn:hover { border-color: #7c3aed44; color: #a78bfa; background: #7c3aed11; }

    /* Input */
    .footer {
      flex-shrink: 0;
      padding: 10px 16px 14px;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .input-wrap {
      flex: 1;
      background: #252525;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 8px 12px;
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within { border-color: #7c3aed; }

    textarea {
      width: 100%;
      background: none;
      border: none;
      outline: none;
      color: #e0e0e0;
      font-size: 12px;
      font-family: inherit;
      resize: none;
      line-height: 1.4;
      max-height: 80px;
    }
    textarea::placeholder { color: #444; }

    .send-btn {
      width: 34px; height: 34px;
      background: #7c3aed;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.1s;
    }
    .send-btn:hover { background: #6d28d9; }
    .send-btn:disabled { background: #2a2a2a; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; fill: #fff; }
  </style>
</head>
<body>

<div class="header">
  <h1>Design Assistant</h1>
  <p>Material Design 3</p>
</div>

<div class="messages" id="messages">
  <div class="message assistant">
    <div class="bubble">Hoi! Ik kan al je vragen over Material Design 3 beantwoorden. Wat wil je weten?</div>
  </div>
  <div class="suggestions" id="suggestions">
    <button class="suggestion-btn">Wat zijn de M3 kleurollen?</button>
    <button class="suggestion-btn">Hoe werkt het tonal palette systeem?</button>
    <button class="suggestion-btn">Welke typografie stijlen heeft M3?</button>
    <button class="suggestion-btn">Wat is het verschil tussen surface en background?</button>
  </div>
</div>

<div class="footer">
  <div class="input-wrap">
    <textarea id="input" placeholder="Stel een vraag over M3..." rows="1"></textarea>
  </div>
  <button class="send-btn" id="send-btn" title="Verstuur">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');
  const suggestionsEl = document.getElementById('suggestions');

  // Conversation history for context
  const history = [];

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
  });

  // Send on Enter (Shift+Enter for newline)
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);

  // Suggestion buttons
  suggestionsEl.addEventListener('click', e => {
    const btn = e.target.closest('.suggestion-btn');
    if (!btn) return;
    inputEl.value = btn.textContent;
    suggestionsEl.remove();
    send();
  });

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    // Remove suggestions if still visible
    suggestionsEl.remove();

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    // Thinking indicator
    const thinkingDiv = document.createElement('div');
    thinkingDiv.className = 'message assistant thinking';
    const thinkingBubble = document.createElement('div');
    thinkingBubble.className = 'bubble';
    thinkingBubble.textContent = 'Nadenken...';
    thinkingDiv.appendChild(thinkingBubble);
    messagesEl.appendChild(thinkingDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      const data = await res.json();
      thinkingDiv.remove();

      if (data.error) {
        addMessage('assistant', `Fout: ${data.error}`);
      } else {
        addMessage('assistant', data.reply);
        history.push({ role: 'assistant', content: data.reply });
      }
    } catch (e) {
      thinkingDiv.remove();
      addMessage('assistant', 'Kan de server niet bereiken. Draait de server op poort 7780?');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
