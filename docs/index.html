<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M3 Knowledge Base</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #e0e0e0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: #1a1a1a;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    .sidebar-header h1 { font-size: 13px; font-weight: 700; color: #fff; }
    .sidebar-header p  { font-size: 11px; color: #555; margin-top: 2px; }

    .search-wrap {
      padding: 10px 12px;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    .search-wrap input {
      width: 100%;
      background: #252525;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 10px;
      color: #e0e0e0;
      font-size: 12px;
      outline: none;
    }
    .search-wrap input:focus { border-color: #7c3aed; }

    .nav-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .nav-list::-webkit-scrollbar { width: 4px; }
    .nav-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .nav-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #444;
      padding: 10px 14px 4px;
    }
    .nav-link {
      display: block;
      padding: 4px 14px;
      font-size: 12px;
      color: #888;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-link:hover  { color: #ccc; background: #222; }
    .nav-link.active { color: #a78bfa; border-left-color: #7c3aed; background: #7c3aed11; }
    .nav-link.sub    { padding-left: 24px; font-size: 11px; color: #666; }
    .nav-link.sub:hover  { color: #bbb; }
    .nav-link.sub.active { color: #a78bfa; }

    .main {
      flex: 1;
      overflow-y: auto;
      padding: 40px 56px;
    }
    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .content h1 { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 16px; }
    .content h2 { font-size: 18px; font-weight: 600; color: #e0e0e0; margin: 28px 0 10px; border-bottom: 1px solid #2a2a2a; padding-bottom: 6px; }
    .content h3 { font-size: 15px; font-weight: 600; color: #ccc; margin: 20px 0 8px; }
    .content h4 { font-size: 13px; font-weight: 600; color: #aaa; margin: 14px 0 6px; }
    .content p  { font-size: 14px; line-height: 1.7; color: #bbb; margin-bottom: 12px; }
    .content ul, .content ol { padding-left: 20px; margin-bottom: 12px; }
    .content li { font-size: 14px; line-height: 1.7; color: #bbb; margin-bottom: 3px; }
    .content code { background: #252525; border-radius: 4px; padding: 2px 6px; font-size: 12px; color: #a78bfa; font-family: monospace; }
    .content pre  { background: #252525; border-radius: 8px; padding: 16px; overflow-x: auto; margin-bottom: 16px; }
    .content pre code { background: none; padding: 0; color: #e0e0e0; }
    .content table { border-collapse: collapse; width: 100%; margin-bottom: 16px; font-size: 13px; }
    .content th { background: #252525; color: #ccc; padding: 8px 12px; text-align: left; border: 1px solid #333; }
    .content td { padding: 8px 12px; border: 1px solid #2a2a2a; color: #bbb; }
    .content a  { color: #a78bfa; text-decoration: none; }
    .content a:hover { text-decoration: underline; }
    .content hr { border: none; border-top: 1px solid #2a2a2a; margin: 24px 0; }
    .content blockquote { border-left: 3px solid #7c3aed; padding-left: 16px; margin: 16px 0; color: #888; }

    .source-link { margin-top: 32px; font-size: 11px; color: #333; border-top: 1px solid #222; padding-top: 12px; }
    .source-link a { color: #444; }
    .source-link a:hover { color: #777; }

    .loading { color: #444; font-size: 13px; }
    .no-results { color: #444; font-size: 12px; padding: 8px 14px; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1>M3 Knowledge Base</h1>
    <p>Material Design 3 — scraped documentation</p>
  </div>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search pages..." />
  </div>
  <div class="nav-list" id="nav"></div>
</aside>

<main class="main">
  <div class="content" id="content">
    <p class="loading">Loading...</p>
  </div>
</main>

<script>
  const BASE = '..';
  const navEl     = document.getElementById('nav');
  const contentEl = document.getElementById('content');
  const searchEl  = document.getElementById('search');
  let activeLink  = null;
  let allLinks    = []; // { label, file, el }

  // Build nav from INDEX.md
  async function buildNav() {
    const res  = await fetch(`${BASE}/knowledge/INDEX.md`);
    const text = await res.text();

    // Parse lines like: - [file](file) — url
    const lines = text.split('\n').filter(l => l.startsWith('- ['));

    // Group by top-level folder
    const groups = {};
    for (const line of lines) {
      const match = line.match(/\- \[(.+?)\]\((.+?)\)/);
      if (!match) continue;
      const file  = match[2];
      const parts = file.split('/');
      const group = parts.length > 1 ? parts[0] : 'root';
      const label = file.replace('.md', '').split('/').pop().replace(/-/g, ' ');
      if (!groups[group]) groups[group] = [];
      groups[group].push({ label, file });
    }

    // Render nav
    const SECTION_LABELS = {
      components:  'Components',
      foundations: 'Foundations',
      styles:      'Styles',
      develop:     'Develop',
      blog:        'Blog',
      root:        'Overview',
    };

    const ORDER = ['root', 'components', 'foundations', 'styles', 'develop', 'blog'];

    for (const group of ORDER) {
      const pages = groups[group];
      if (!pages || pages.length === 0) continue;

      const sectionLabel = document.createElement('div');
      sectionLabel.className = 'nav-section-label';
      sectionLabel.textContent = SECTION_LABELS[group] || group;
      navEl.appendChild(sectionLabel);

      // Sort: parent pages first, then sub-pages
      pages.sort((a, b) => a.file.localeCompare(b.file));

      for (const page of pages) {
        const depth = page.file.split('/').length - 1;
        const link  = document.createElement('a');
        link.className = 'nav-link' + (depth > 1 ? ' sub' : '');
        link.textContent = capitalize(page.label);
        link.title = page.file;
        link.addEventListener('click', () => loadPage(page.file, link));
        navEl.appendChild(link);
        allLinks.push({ label: page.label, file: page.file, el: link });
      }
    }

    // Load first page
    if (allLinks.length) loadPage(allLinks[0].file, allLinks[0].el);
  }

  function capitalize(s) {
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  async function loadPage(file, linkEl) {
    if (activeLink) activeLink.classList.remove('active');
    linkEl.classList.add('active');
    activeLink = linkEl;

    contentEl.innerHTML = '<p class="loading">Loading...</p>';

    try {
      const res = await fetch(`${BASE}/knowledge/${file}`);
      if (!res.ok) throw new Error('Not found');
      let md = await res.text();

      const sourceMatch = md.match(/<!-- Source: (.*?) -->/);
      const sourceUrl   = sourceMatch ? sourceMatch[1].trim() : null;

      md = md.replace(/<!--.*?-->/gs, '').trim();
      contentEl.innerHTML = marked.parse(md);

      if (sourceUrl) {
        const el = document.createElement('div');
        el.className = 'source-link';
        el.innerHTML = `Source: <a href="${sourceUrl}" target="_blank">${sourceUrl}</a>`;
        contentEl.appendChild(el);
      }

      document.querySelector('.main').scrollTop = 0;
    } catch (e) {
      contentEl.innerHTML = `<p style="color:#ef4444">Could not load: ${e.message}</p>`;
    }
  }

  // Search
  searchEl.addEventListener('input', () => {
    const q = searchEl.value.toLowerCase().trim();
    let visible = 0;

    for (const { label, file, el } of allLinks) {
      const match = !q || label.includes(q) || file.includes(q);
      el.style.display = match ? '' : 'none';
      if (match) visible++;
    }

    // Show/hide section labels based on whether any child is visible
    const labels = navEl.querySelectorAll('.nav-section-label');
    labels.forEach(lbl => {
      let next = lbl.nextElementSibling;
      let hasVisible = false;
      while (next && !next.classList.contains('nav-section-label')) {
        if (next.style.display !== 'none') hasVisible = true;
        next = next.nextElementSibling;
      }
      lbl.style.display = hasVisible ? '' : 'none';
    });
  });

  buildNav();
</script>
</body>
</html>
