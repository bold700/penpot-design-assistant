<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M3 Knowledge Base</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #e0e0e0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: #1a1a1a;
      border-right: 1px solid #2a2a2a;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    .sidebar-header h1 { font-size: 13px; font-weight: 700; color: #fff; }
    .sidebar-header p  { font-size: 11px; color: #555; margin-top: 2px; }

    .nav-section { padding: 8px 0; }
    .nav-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #444;
      padding: 6px 16px 4px;
    }
    .nav-link {
      display: block;
      padding: 5px 16px;
      font-size: 12px;
      color: #888;
      text-decoration: none;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-link:hover { color: #ccc; background: #222; }
    .nav-link.active { color: #a78bfa; border-left-color: #7c3aed; background: #7c3aed11; }

    /* Main content */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 40px 48px;
      max-width: 860px;
    }
    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    /* Markdown styles */
    .content h1 { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 12px; }
    .content h2 { font-size: 20px; font-weight: 600; color: #e0e0e0; margin: 28px 0 10px; border-bottom: 1px solid #2a2a2a; padding-bottom: 6px; }
    .content h3 { font-size: 16px; font-weight: 600; color: #ccc; margin: 20px 0 8px; }
    .content h4 { font-size: 14px; font-weight: 600; color: #aaa; margin: 16px 0 6px; }
    .content p  { font-size: 14px; line-height: 1.7; color: #bbb; margin-bottom: 12px; }
    .content ul, .content ol { padding-left: 20px; margin-bottom: 12px; }
    .content li { font-size: 14px; line-height: 1.7; color: #bbb; margin-bottom: 4px; }
    .content code { background: #252525; border-radius: 4px; padding: 2px 6px; font-size: 12px; color: #a78bfa; font-family: monospace; }
    .content pre  { background: #252525; border-radius: 8px; padding: 16px; overflow-x: auto; margin-bottom: 16px; }
    .content pre code { background: none; padding: 0; color: #e0e0e0; }
    .content blockquote { border-left: 3px solid #7c3aed; padding-left: 16px; margin: 16px 0; color: #888; }
    .content a { color: #a78bfa; text-decoration: none; }
    .content a:hover { text-decoration: underline; }
    .content hr { border: none; border-top: 1px solid #2a2a2a; margin: 24px 0; }

    /* Comment lines (source/scraped metadata) */
    .content .meta { display: none; }

    .source-link {
      display: inline-block;
      margin-top: 32px;
      font-size: 11px;
      color: #444;
      border-top: 1px solid #2a2a2a;
      padding-top: 12px;
      width: 100%;
    }
    .source-link a { color: #555; }
    .source-link a:hover { color: #888; }

    .loading { color: #444; font-size: 13px; padding: 20px 0; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1>M3 Knowledge Base</h1>
    <p>Material Design 3</p>
  </div>
  <nav id="nav"></nav>
</aside>

<main class="main">
  <div class="content" id="content">
    <p class="loading">Select a page from the sidebar...</p>
  </div>
</main>

<script>
  const PAGES = {
    'Overview': [
      { label: 'Overview', file: '../knowledge/overview.md' },
    ],
    'Components': [
      { label: 'Bottom Sheets',        file: '../knowledge/components/bottom-sheets.md' },
      { label: 'Buttons',              file: '../knowledge/components/buttons.md' },
      { label: 'Cards',                file: '../knowledge/components/cards.md' },
      { label: 'Carousel',             file: '../knowledge/components/carousel.md' },
      { label: 'Checkbox',             file: '../knowledge/components/checkbox.md' },
      { label: 'Chips',                file: '../knowledge/components/chips.md' },
      { label: 'Date Pickers',         file: '../knowledge/components/date-pickers.md' },
      { label: 'Dialogs',              file: '../knowledge/components/dialogs.md' },
      { label: 'Divider',              file: '../knowledge/components/divider.md' },
      { label: 'FAB',                  file: '../knowledge/components/floating-action-button.md' },
      { label: 'Extended FAB',         file: '../knowledge/components/extended-fab.md' },
      { label: 'Icon Buttons',         file: '../knowledge/components/icon-buttons.md' },
      { label: 'Lists',                file: '../knowledge/components/lists.md' },
      { label: 'Menus',                file: '../knowledge/components/menus.md' },
      { label: 'Navigation Bar',       file: '../knowledge/components/navigation-bar.md' },
      { label: 'Navigation Drawer',    file: '../knowledge/components/navigation-drawer.md' },
      { label: 'Navigation Rail',      file: '../knowledge/components/navigation-rail.md' },
      { label: 'Progress Indicators',  file: '../knowledge/components/progress-indicators.md' },
      { label: 'Radio Button',         file: '../knowledge/components/radio-button.md' },
      { label: 'Search',               file: '../knowledge/components/search.md' },
      { label: 'Side Sheets',          file: '../knowledge/components/side-sheets.md' },
      { label: 'Sliders',              file: '../knowledge/components/sliders.md' },
      { label: 'Snackbar',             file: '../knowledge/components/snackbar.md' },
      { label: 'Switch',               file: '../knowledge/components/switch.md' },
      { label: 'Tabs',                 file: '../knowledge/components/tabs.md' },
      { label: 'Text Fields',          file: '../knowledge/components/text-fields.md' },
      { label: 'Time Pickers',         file: '../knowledge/components/time-pickers.md' },
      { label: 'Tooltips',             file: '../knowledge/components/tooltips.md' },
    ],
    'Foundations': [
      { label: 'Adaptive Design',  file: '../knowledge/foundations/adaptive-design.md' },
      { label: 'Content Design',   file: '../knowledge/foundations/content-design.md' },
      { label: 'Customization',    file: '../knowledge/foundations/customization.md' },
      { label: 'Design Tokens',    file: '../knowledge/foundations/design-tokens.md' },
      { label: 'Interaction',      file: '../knowledge/foundations/interaction.md' },
      { label: 'Layout',           file: '../knowledge/foundations/layout.md' },
    ],
    'Styles': [
      { label: 'Color',              file: '../knowledge/styles/color.md' },
      { label: 'Color System',       file: '../knowledge/styles/color-system.md' },
      { label: 'Dynamic Color',      file: '../knowledge/styles/color-dynamic.md' },
      { label: 'Elevation',          file: '../knowledge/styles/elevation.md' },
      { label: 'Icons',              file: '../knowledge/styles/icons.md' },
      { label: 'Motion',             file: '../knowledge/styles/motion.md' },
      { label: 'Motion Easing',      file: '../knowledge/styles/motion-easing.md' },
      { label: 'Motion Transitions', file: '../knowledge/styles/motion-transitions.md' },
      { label: 'Shape',              file: '../knowledge/styles/shape.md' },
      { label: 'Typography',         file: '../knowledge/styles/typography.md' },
      { label: 'Type Scale',         file: '../knowledge/styles/typography-type-scale.md' },
    ],
  };

  const navEl     = document.getElementById('nav');
  const contentEl = document.getElementById('content');
  let activeLink  = null;

  // Build sidebar
  for (const [section, pages] of Object.entries(PAGES)) {
    const sectionEl = document.createElement('div');
    sectionEl.className = 'nav-section';

    const label = document.createElement('div');
    label.className = 'nav-section-label';
    label.textContent = section;
    sectionEl.appendChild(label);

    for (const page of pages) {
      const link = document.createElement('a');
      link.className = 'nav-link';
      link.textContent = page.label;
      link.addEventListener('click', () => loadPage(page.file, page.label, link));
      sectionEl.appendChild(link);
    }

    navEl.appendChild(sectionEl);
  }

  async function loadPage(file, label, linkEl) {
    if (activeLink) activeLink.classList.remove('active');
    linkEl.classList.add('active');
    activeLink = linkEl;

    contentEl.innerHTML = '<p class="loading">Loading...</p>';

    try {
      const res = await fetch(file);
      if (!res.ok) throw new Error('Not found');
      let md = await res.text();

      // Extract source URL from comment
      const sourceMatch = md.match(/<!-- Source: (.*?) -->/);
      const sourceUrl   = sourceMatch ? sourceMatch[1] : null;

      // Remove HTML comments before rendering
      md = md.replace(/<!--.*?-->/gs, '');

      contentEl.innerHTML = marked.parse(md);

      if (sourceUrl) {
        const sourceEl = document.createElement('div');
        sourceEl.className = 'source-link';
        sourceEl.innerHTML = `Source: <a href="${sourceUrl}" target="_blank">${sourceUrl}</a>`;
        contentEl.appendChild(sourceEl);
      }

      // Scroll to top
      document.querySelector('.main').scrollTop = 0;

    } catch (e) {
      contentEl.innerHTML = `<p style="color:#ef4444">Could not load ${label}: ${e.message}</p>`;
    }
  }

  // Load first page by default
  const firstLink = navEl.querySelector('.nav-link');
  if (firstLink) firstLink.click();
</script>
</body>
</html>
